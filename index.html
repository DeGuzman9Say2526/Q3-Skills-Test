<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q3 Skills Test</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container mt-5 text-center">
        <h1 class="mb-2">Member Sign-up</h1>
        <p class="mb-5">Please fill in the details below to register.</p>

        <div class="row justify-content-center">
            <div class="col-md-5">
                <h3 class="mb-4">Student details</h3>
                <div class="form-group mb-3">
                    <label>Full Name:</label>
                    <input type="text" id="fullname" class="form-control mx-auto" placeholder="eg Johnathan Full Name">
                </div>
                <div class="form-group">
                    <label>Ticket selection: (250.00 Pesos per ticket)</label>
                    <input type="number" id="ticketqty" class="form-control mx-auto" placeholder="e.g 2">
                </div>
            </div>

            <div class="col-md-5">
                <h3 class="mb-4">Payment details</h3>
                <div class="d-flex justify-content-center align-items-center mb-2">
                    <label class="me-2">Subtotal:</label>
                    <input type="text" id="subtotal" class="result-box" readonly>
                </div>
                <div class="d-flex justify-content-center align-items-center mb-2">
                    <label class="me-2">Admin Fee:</label>
                    <input type="text" id="adminfee" class="result-box" readonly>
                </div>
                <div class="d-flex justify-content-center align-items-center mt-4">
                    <h3 class="text-warning me-2">Total:</h3>
                    <input type="text" id="total" class="result-box total-box" readonly>
                </div>
            </div>
        </div>

        <div class="mt-5">
            <button class="btn btn-primary btn-lg px-5" onclick="register()">Register</button>
            <p id="message" class="mt-3"></p>
            <a href="https://www.w3schools.com" target="_blank" class="text-white opacity-50">Source: W3Schools</a>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
